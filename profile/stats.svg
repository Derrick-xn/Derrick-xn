<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="statsTitle statsDesc">
  <title id="statsTitle">GitHub stats card placeholder</title>
  <desc id="statsDesc">Placeholder card shown until GitHub Actions generates the profile statistics SVG.</desc>
  <rect width="495" height="195" rx="12" fill="#141321"/>
  <rect x="1" y="1" width="493" height="193" rx="11" stroke="#2F2B45" stroke-width="2"/>
  <circle cx="34" cy="34" r="8" fill="#FE428E"/>
  <text x="54" y="40" fill="#A9FEF7" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">GitHub Stats</text>
  <text x="28" y="78" fill="#F8F8F2" font-family="Segoe UI, Arial, sans-serif" font-size="15">Generating local README card...</text>
  <text x="28" y="106" fill="#C9D1D9" font-family="Segoe UI, Arial, sans-serif" font-size="13">After you push this repo, run:</text>
  <text x="28" y="128" fill="#C9D1D9" font-family="Segoe UI, Arial, sans-serif" font-size="13">Actions -&gt; Update README cards -&gt; Run workflow</text>
  <text x="28" y="160" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">Optional: add PROFILE_STATS_TOKEN to include private stats later.</text>
</svg>
